<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Battle for Embolia - Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <!-- Columna 1: Habilidades -->
        <section class="panel" id="panel-habilidades">
            <h2 class="panel-title">Habilidades</h2>
            <div id="skills-list"></div>
        </section>

        <!-- Columna 2: Personaje y Equipo -->
        <section class="panel" id="panel-personaje">
            <h2 class="panel-title">Equipamiento</h2>
            <div class="gear-layout">
                <div class="slots-left">
                    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
                </div>
                <div class="character-model">MODELO PJ</div>
                <div class="slots-right">
                    <div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div><div class="slot"></div>
                </div>
            </div>
        </section>

        <!-- Columna 3: Estadísticas -->
        <section class="panel" id="panel-stats">
            <h2 class="panel-title">Estadísticas</h2>
            <div id="stats-content">
                <p>Daño Total: <span id="dmg">222</span></p>
                <p>Defensa: <span id="def">31</span></p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
