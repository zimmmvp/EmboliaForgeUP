<!DOCTYPE html>
<html>
<body style="background:#222; color:#fff; font-family:sans-serif; padding:20px;">
    <h2>Ordenador de Imágenes</h2>
    <div style="display:flex; gap:20px;">
        <!-- Columna 1: Lista de Ítems (la sacamos de tu app.js o item.txt) -->
        <div>
            <h3>Ítems del Juego</h3>
            <textarea id="listaItems" rows="10" cols="30" placeholder="ID:Nombre&#10;item_1:Espada Chota"></textarea>
        </div>
        <!-- Columna 2: Nombres de tus archivos de imagen -->
        <div>
            <h3>Archivos en carpeta /img/</h3>
            <textarea id="listaArchivos" rows="10" cols="30" placeholder="imagen123.png&#10;foto_espada.png"></textarea>
        </div>
    </div>
    <button onclick="emparejar()" style="padding:10px; margin-top:10px; cursor:pointer;">¡Generar Mapeo!</button>
    
    <h3>Código resultante:</h3>
    <pre id="resultado" style="background:#000; padding:10px;"></pre>

    <script>
        function emparejar() {
            const items = document.getElementById('listaItems').value.split('\n');
            const archivos = document.getElementById('listaArchivos').value.split('\n');
            let mapa = "const MAPEO_IMAGENES = {\n";
            
            items.forEach((item, index) => {
                if(item && archivos[index]) {
                    const id = item.split(':')[0].trim();
                    const archivo = archivos[index].trim();
                    mapa += `    "${id}": "${archivo}",\n`;
                }
            });
            mapa += "};";
            document.getElementById('resultado').innerText = mapa;
        }
    </script>
</body>
</html>
